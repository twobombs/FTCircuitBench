repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(qasm/|figs/|circuit_outputs/|circuit_stats_output/|circuit_benchmarks/|.*\.ipynb$|uv\.lock$)'
      - id: end-of-file-fixer
        exclude: '^(qasm/|figs/|circuit_outputs/|circuit_stats_output/|circuit_benchmarks/|.*\.ipynb$|uv\.lock$)'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: '^(qasm/|figs/|circuit_outputs/|circuit_stats_output/|circuit_benchmarks/|.*\.ipynb$|uv\.lock$)'
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        types_or: [python, pyi]
  - repo: https://github.com/pycqa/isort
    rev: 6.1.0
    hooks:
      - id: isort
        types_or: [python, pyi]
